name: Auto Versioning

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Git Config
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Bump version based on commit messages
        run: |
          # Get the last commit message
          LATEST_COMMIT=$(git log -1 --pretty=%B)
          echo "Processing latest commit message: $LATEST_COMMIT"
          
          # Default to patch
          BUMP_TYPE="patch"
          
          if echo "$LATEST_COMMIT" | grep -iq "breaking change" || echo "$LATEST_COMMIT" | grep -iqE "feat(\([a-zA-Z0-9_-]+\))?!:"; then
            BUMP_TYPE="major"
          elif echo "$LATEST_COMMIT" | grep -iq "^feat"; then
            BUMP_TYPE="minor"
          elif echo "$LATEST_COMMIT" | grep -iq "^fix" || echo "$LATEST_COMMIT" | grep -iq "^refactor" || echo "$LATEST_COMMIT" | grep -iq "^perf"; then
            BUMP_TYPE="patch"
          fi
          
          echo "Determined bump type: $BUMP_TYPE"
          
          # Bump package.json version without creating git tag immediately
          npm version $BUMP_TYPE --no-git-tag-version
          
          # Get new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New Version: $NEW_VERSION"
          
          # Commit the updated package.json back to main (avoid CI loops)
          git add package.json
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          
          # Create tag and push
          git tag "v$NEW_VERSION"
          git push origin main --tags
